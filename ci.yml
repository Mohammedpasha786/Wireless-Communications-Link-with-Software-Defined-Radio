name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff black isort
      - run: ruff check src/ scripts/ tests/
      - run: black --check src/ scripts/ tests/
      - run: isort --check-only src/ scripts/ tests/

  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ --cov=src --cov-report=xml -v
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  simulate:
    name: Smoke-test link simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt && pip install -e .
      - name: QPSK AWGN baseline
        run: python scripts/simulate_link.py --modulation QPSK --channel awgn --snr 20 --n-bits 5000
      - name: Reliability preset
        run: python scripts/simulate_link.py --optimize reliability --n-bits 5000
      - name: Throughput preset
        run: python scripts/simulate_link.py --optimize throughput --n-bits 5000
      - name: BER sweep (quick)
        run: python scripts/ber_sweep.py --modulation QPSK --snr-min 0 --snr-max 20 --snr-step 5 --n-bits 5000
